<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JYRAC 広報局ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-slate-900">

    <header class="bg-[#002B41] text-white p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">JYRAC PR System</h1>
            <nav class="space-x-4 text-sm">
                <a href="https://github.com/あなたのユーザー名/jyrac-pr/issues" target="_blank" class="hover:text-emerald-400">議事録一覧</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto py-10 px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 border-l-4 border-[#00A19B] pl-3">SNS・制作担当</h2>
                <ul class="space-y-3">
                    <li class="flex justify-between border-b pb-2"><span>Instagram</span> <span class="font-bold text-emerald-700">J・N</span></li>
                    <li class="flex justify-between border-b pb-2"><span>X (Twitter)</span> <span class="font-bold text-emerald-700">J</span></li>
                    <li class="flex justify-between border-b pb-2"><span>HP</span> <span class="font-bold text-emerald-700">J・N</span></li>
                    <li class="flex justify-between"><span>ポスター募集</span> <span class="font-bold text-orange-600">横山</span></li>
                </ul>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 border-l-4 border-[#00A19B] pl-3">YouTube 1on1調整</h2>
                <p class="text-sm mb-4 text-gray-600">Googleカレンダーの予約リンクへ飛びます。</p>
                <a href="あなたのGoogleカレンダー予約URL" target="_blank" class="block w-full text-center bg-[#00A19B] text-white py-3 rounded-lg font-bold hover:opacity-90">
                    インタビュー日程を調整する
                </a>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 border-l-4 border-[#00A19B] pl-3">議事録を作成する</h2>
                <p class="text-sm mb-4 text-gray-600">内容はGitHubの「Issues」にストックされ、防災政策比較の基データになります。</p>
                <a href="https://github.com/あなたのユーザー名/jyrac-pr/issues/new" target="_blank" class="block w-full text-center bg-slate-700 text-white py-3 rounded-lg font-bold hover:bg-slate-800">
                    新規議事録（Issue）を作成
                </a>
            </div>
        </div>
    </main>

</body>
</html>
